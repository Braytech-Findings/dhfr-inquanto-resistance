name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-integrity:
    name: Public integrity and reproduction plan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight public test dependencies
        run: python -m pip install --upgrade pytest ruff numpy pandas pyyaml

      - name: Compile scripts
        run: python -m compileall -q scripts

      - name: Lint stable public paths
        run: >-
          ruff check
          scripts/test_quantinuum_access.py
          scripts/submit_hosted_pauli_energy.py
          scripts/reproduce_everything.py
          tests

      - name: Test
        run: pytest -q

      - name: Validate the safe reproduction command plan
        run: python scripts/reproduce_everything.py --dry-run
