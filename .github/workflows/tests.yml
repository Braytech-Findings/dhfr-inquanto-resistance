name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install lightweight test dependencies
        run: python -m pip install pytest ruff numpy pandas pyyaml jsonschema
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
