<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">DHFR InQuanto reproducibility dashboard</title>
  <desc id="desc">A four-stage visual dashboard connecting biological structure, classical chemistry, quantum measurement, and verified publication assets.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061b26"/>
      <stop offset="0.48" stop-color="#123e4c"/>
      <stop offset="1" stop-color="#312254"/>
    </linearGradient>
    <linearGradient id="bio" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#52e0ae"/><stop offset="1" stop-color="#1ca8a8"/></linearGradient>
    <linearGradient id="chem" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5ed4ff"/><stop offset="1" stop-color="#4978e8"/></linearGradient>
    <linearGradient id="quant" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c08cff"/><stop offset="1" stop-color="#7b4ee8"/></linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffb260"/><stop offset="1" stop-color="#e65f88"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/></filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#fff" opacity="0.08"/></pattern>
  </defs>
  <rect width="1200" height="390" rx="26" fill="url(#background)"/>
  <rect width="1200" height="390" rx="26" fill="url(#dots)"/>
  <text x="600" y="48" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">FROM DHFR STRUCTURE TO REPRODUCIBLE QUANTUM EVIDENCE</text>
  <text x="600" y="76" text-anchor="middle" fill="#cce7ee" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Public assets regenerate locally · licensed calculations stay clearly labeled · no cloud submission is required</text>

  <!-- connector -->
  <line x1="190" y1="217" x2="1010" y2="217" stroke="#d8e8ff" stroke-opacity="0.38" stroke-width="5" stroke-linecap="round"/>
  <g fill="#fff" opacity="0.72"><path d="M328 209 l16 8 -16 8z"/><path d="M603 209 l16 8 -16 8z"/><path d="M878 209 l16 8 -16 8z"/></g>

  <!-- cards -->
  <g transform="translate(45 112)" filter="url(#shadow)">
    <rect width="260" height="210" rx="22" fill="#0e2c35" stroke="#61e1bb" stroke-width="2"/>
    <circle cx="130" cy="70" r="42" fill="url(#bio)"/>
    <path d="M112 54 C134 38 153 49 148 66 C143 83 122 87 112 71 C105 61 105 58 112 54z" fill="none" stroke="#06382f" stroke-width="5"/>
    <circle cx="118" cy="60" r="4" fill="#06382f"/><circle cx="139" cy="69" r="4" fill="#06382f"/>
    <text x="130" y="133" text-anchor="middle" fill="#7df0c9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">1 · BIOLOGICAL MODEL</text>
    <text x="130" y="157" text-anchor="middle" fill="#e8fffa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">WT DHFR + trimethoprim</text>
    <text x="130" y="176" text-anchor="middle" fill="#b9dcd6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Prepared structure and compact QM cluster</text>
    <rect x="55" y="188" width="150" height="27" rx="13" fill="#52e0ae" fill-opacity="0.16"/><text x="130" y="206" text-anchor="middle" fill="#8cf4d1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">REPRODUCIBLE INPUTS</text>
  </g>

  <g transform="translate(320 112)" filter="url(#shadow)">
    <rect width="260" height="210" rx="22" fill="#102b49" stroke="#65cfff" stroke-width="2"/>
    <circle cx="130" cy="70" r="42" fill="url(#chem)"/>
    <g stroke="#092a50" stroke-width="4" fill="none"><polygon points="130,43 153,56 153,83 130,96 107,83 107,56"/><line x1="130" y1="43" x2="130" y2="26"/><line x1="153" y1="83" x2="169" y2="94"/></g>
    <text x="130" y="133" text-anchor="middle" fill="#83dcff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">2 · CLASSICAL CHEMISTRY</text>
    <text x="130" y="157" text-anchor="middle" fill="#edf9ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">PySCF electronic structure</text>
    <text x="130" y="176" text-anchor="middle" fill="#bdd4ea" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Active-space Hamiltonian and reference energy</text>
    <rect x="55" y="188" width="150" height="27" rx="13" fill="#5ed4ff" fill-opacity="0.16"/><text x="130" y="206" text-anchor="middle" fill="#9be6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">METHOD BOUNDARIES</text>
  </g>

  <g transform="translate(595 112)" filter="url(#shadow)">
    <rect width="260" height="210" rx="22" fill="#251c49" stroke="#be8bff" stroke-width="2"/>
    <circle cx="130" cy="70" r="42" fill="url(#quant)"/>
    <g stroke="#281052" stroke-width="4" fill="none"><line x1="99" y1="55" x2="161" y2="55"/><line x1="99" y1="72" x2="161" y2="72"/><line x1="99" y1="89" x2="161" y2="89"/><circle cx="114" cy="55" r="6" fill="#281052"/><circle cx="145" cy="72" r="6" fill="#281052"/><circle cx="130" cy="89" r="6" fill="#281052"/></g>
    <text x="130" y="133" text-anchor="middle" fill="#d0adff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">3 · QUANTUM WORKFLOW</text>
    <text x="130" y="157" text-anchor="middle" fill="#fbf5ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">12-qubit UCCSD and Pauli grouping</text>
    <text x="130" y="176" text-anchor="middle" fill="#d4c4e8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Local H2-1LE finite-shot emulator</text>
    <rect x="55" y="188" width="150" height="27" rx="13" fill="#c08cff" fill-opacity="0.16"/><text x="130" y="206" text-anchor="middle" fill="#d9bdff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">NO PHYSICAL QPU CLAIM</text>
  </g>

  <g transform="translate(870 112)" filter="url(#shadow)">
    <rect width="285" height="210" rx="22" fill="#48233a" stroke="#ff9d71" stroke-width="2"/>
    <circle cx="142" cy="70" r="42" fill="url(#result)"/>
    <g fill="none" stroke="#5b1836" stroke-width="4" stroke-linecap="round"><line x1="115" y1="90" x2="115" y2="66"/><line x1="134" y1="90" x2="134" y2="49"/><line x1="153" y1="90" x2="153" y2="59"/><line x1="172" y1="90" x2="172" y2="38"/></g>
    <text x="142" y="133" text-anchor="middle" fill="#ffc09e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="800">4 · VERIFIED ASSETS</text>
    <text x="142" y="157" text-anchor="middle" fill="#fff6f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Figures, tables, provenance, uncertainty</text>
    <text x="142" y="176" text-anchor="middle" fill="#ead0d5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">PNG + PDF + CSV + machine-readable records</text>
    <rect x="60" y="188" width="164" height="27" rx="13" fill="#ff9a6c" fill-opacity="0.16"/><text x="142" y="206" text-anchor="middle" fill="#ffc5a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">PUBLICLY REGENERATED</text>
  </g>

  <text x="600" y="365" text-anchor="middle" fill="#b7d1dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Verified scope: one WT_TMP local-emulator benchmark · not drug-resistance prediction · not quantum advantage · not physical hardware</text>
</svg>
