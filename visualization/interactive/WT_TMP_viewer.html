<!doctype html><html lang="en"><meta charset="utf-8"><title>WT_TMP molecular viewer</title><script src="https://3Dmol.org/build/3Dmol-min.js"></script><body><h1>WT DHFR–TMP prepared structure</h1><p>Protein: chain A. Ligand: TOP, chain X. QM overlay is withheld because mapping is unverified.</p><div id="viewer" style="width:100%;height:640px"></div><script>fetch('../../data/processed/WT_TMP_minimized.pdb').then(r=>r.text()).then(p=>{const v=$3Dmol.createViewer('viewer',{backgroundColor:'white'});v.addModel(p,'pdb');v.setStyle({chain:'A'},{cartoon:{color:'spectrum'}});v.setStyle({resn:'TOP'},{stick:{colorscheme:'Jmol'}});v.zoomTo({resn:'TOP'});v.render();});</script></body></html>
